<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kindred — Understand Yourself, Understand Each Other</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  :root{ --ink:#23271f; --canvas:#fbf7f1; --forest:#2c5347; --coral:#e2684a; }
  body{ background:var(--canvas); color:var(--ink); font-family:sans-serif; }
  .page{ display:none; }
  .page.active{ display:block; }
  .btn-primary{ background:var(--coral); color:#fff; padding:12px 24px; border-radius:9999px; font-weight:600; }
  .card{ background:#fff; border:1px solid rgba(0,0,0,0.1); padding:16px; border-radius:12px; }
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav class="p-5 flex gap-5 font-bold">
  <button onclick="goTo('home')">Home</button>
  <button onclick="goTo('chat')">Chatbot</button>
  <button onclick="goTo('personality')">Personality Quiz</button>
  <button onclick="goTo('tricky')">Tricky Quiz</button>
</nav>

<main class="p-5">
  <!-- HOME -->
  <section id="page-home" class="page active"><h1>Welcome to Kindred</h1></section>

  <!-- CHATBOT -->
  <section id="page-chat" class="page"><div id="chat-window" class="h-64 border p-4"></div></section>

  <!-- PERSONALITY QUIZ -->
  <section id="page-personality" class="page"><h1>Personality Quiz</h1></section>

  <!-- TRICKY QUIZ -->
  <section id="page-tricky" class="page">
    <div id="tricky-intro">
      <h1 class="text-2xl mb-4">The Tricky Quiz</h1>
      <button onclick="startTricky()" class="btn-primary">Start Quiz</button>
    </div>
    <div id="tricky-quiz" class="hidden">
      <h2 id="tricky-question" class="text-xl mb-4"></h2>
      <div id="tricky-options" class="grid gap-2"></div>
    </div>
    <div id="tricky-result" class="hidden">
      <h2 id="tricky-score"></h2>
      <button onclick="startTricky()" class="btn-primary mt-4">Try Again</button>
    </div>
  </section>
</main>

<script>
/* NAVIGATION */
function goTo(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
}

/* TRICKY QUIZ LOGIC */
const trickyQuestions = [
  {q: "If you have 3 apples and you take away 2, how many apples do you have?", options: ["1", "2", "3"], correct: 1},
  {q: "What is always coming but never arrives?", options: ["Tomorrow", "The future", "Yesterday"], correct: 0}
];

let tIndex = 0, tScore = 0;

function startTricky(){
  tIndex = 0; tScore = 0;
  document.getElementById('tricky-intro').classList.add('hidden');
  document.getElementById('tricky-result').classList.add('hidden');
  document.getElementById('tricky-quiz').classList.remove('hidden');
  renderTricky();
}

function renderTricky(){
  const q = trickyQuestions[tIndex];
  document.getElementById('tricky-question').textContent = q.q;
  document.getElementById('tricky-options').innerHTML = q.options.map((opt, i) => `
    <button class="card" onclick="answerTricky(${i})">${opt}</button>
  `).join('');
}

function answerTricky(index){
  if(index === trickyQuestions[tIndex].correct) tScore++;
  tIndex++;
  if(tIndex < trickyQuestions.length) renderTricky();
  else {
    document.getElementById('tricky-quiz').classList.add('hidden');
    document.getElementById('tricky-result').classList.remove('hidden');
    document.getElementById('tricky-score').textContent = `You scored ${tScore} out of ${trickyQuestions.length}.`;
  }
}
</script>
</body>
</html>
