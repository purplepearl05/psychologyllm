<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Behavioral Insight Portal</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f4f9; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; }
        .tab-btn.active { background: #333; color: white; }
        .quiz-section { display: none; background: white; padding: 20px; border-radius: 8px; }
        .quiz-section.active { display: block; }
        .question { margin-bottom: 20px; }
        button#analyze { margin-top: 20px; padding: 15px; background: #28a745; color: white; border: none; cursor: pointer; width: 100%; }
        #report { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #fff; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Assessment Dashboard</h2>
    <div>
        <button class="tab-btn active" onclick="openQuiz('personality')">Personality Insight</button>
        <button class="tab-btn" onclick="openQuiz('couples')">Relationship Dynamics</button>
    </div>

    <!-- Personality Quiz -->
    <div id="personality" class="quiz-section active">
        <h3>Personality Depth Assessment</h3>
        <div id="p-questions"></div>
    </div>

    <!-- Couples Quiz -->
    <div id="couples" class="quiz-section">
        <h3>Relationship Dynamics Assessment</h3>
        <div id="c-questions"></div>
    </div>

    <button id="analyze" onclick="analyzePatterns()">Generate Behavioral Report</button>
    <div id="report"></div>

<script>
const personalityQs = [
    "The Success Narrative: You win an award. Do you (A) Let people think you were the mastermind? (B) Ensure the team knows I value their work equally?",
    "The Critique Reflex: Someone points out a mistake. Do you (A) Find a flaw in their argument to neutralize it? (B) Honestly check if they’re right?",
    "The Social Battery: Being where no one knows your status makes you feel (A) Slightly restless/invisible? (B) Relaxed, it's refreshing?",
    "The Favor: Helping someone makes you feel (A) They now owe me loyalty? (B) I've relieved their burden?",
    "The Rule-Breaker: A rule stops you. You (A) Circumvent it, it's just a suggestion? (B) Follow it, it keeps things fair?",
    "The Conflict Pivot: Losing an argument, you (A) Pivot to their character? (B) Drop your point and listen?",
    "The Boring Person: You label someone uninteresting if (A) They have no utility/status? (B) They are dishonest/unkind?",
    "The Emotional Leak: Seeing someone cry, you (A) Feel awkward/irritated? (B) Feel immediate concern?",
    "The Special Feeling: Are you destined for more than average? (A) Yes, it's my baseline? (B) No, simple life is fine?",
    "The Mirroring: When meeting someone, you (A) Mirror their vibe to build rapport? (B) Stay yourself?",
    "The Remorse Test: Hurting someone, what bothers you? (A) They think less of me? (B) They are in pain?",
    "The Power Vacuum: Entering a group, you (A) Map the leader to leverage them? (B) Look for people I like?",
    "The Vulnerability Test: Sharing secrets is (A) Giving them a weapon? (B) Necessary for trust?",
    "The Boredom Trap: A situation doesn't serve you. You (A) Cut ties instantly? (B) Feel loyalty and try to evolve?",
    "The Game Mentality: Life is (A) A competition? (B) A community?"
];

const coupleQs = [
    "The Fight: You are exhausted. You (A) Shut down/withdraw? (B) Stay present and hear their hurt?",
    "The Public Silliness: Partner makes you look silly. You (A) Call them out to protect image? (B) Let it go?",
    "The Decision: Partner acts alone. You (A) Retaliate with a unilateral decision? (B) Set a boundary to talk it out?",
    "The Scorecard: When they fail, you (A) Store it to use as ammo? (B) Process and clear it?",
    "The Support: Partner is spiraling. You (A) Give a logic fix to stop the noise? (B) Hold space for them?",
    "The Growth Gap: They are coasting. You (A) Feel they are dead weight? (B) Encourage them?",
    "The Chores: You feel overworked. You (A) Stop doing your part to show them? (B) Ask for a calm meeting?",
    "The Attraction: You like someone else. You (A) Keep it secret? (B) Create distance to protect the commitment?",
    "The Future: You disagree on a life path. You (A) Expect them to follow my plan? (B) Have a hard talk?",
    "The Vulnerability: They see you at your worst. You (A) Push them away? (B) Feel relieved?",
    "The Family Jab: Family is rude. You (A) Call your partner weak for not defending? (B) Discuss being a united front?",
    "The Empty Season: They are in a low phase. You (A) Look for validation elsewhere? (B) Stay the course?",
    "The Money: They want a risk. You (A) Protect 'my' security? (B) Find middle ground?",
    "The Rejection: They turn down intimacy. You (A) Punish them with distance? (B) Try again later?",
    "The Conflict Core: The relationship is (A) Maximizing own happiness? (B) Mutual growth?"
];

function setupQuiz(id, questions) {
    const container = document.getElementById(id);
    questions.forEach((q, i) => {
        container.innerHTML += `<div class='question'>${q} 
            <br><input type='radio' name='${id}-${i}' value='A'> A 
            <input type='radio' name='${id}-${i}' value='B'> B</div>`;
    });
}

function openQuiz(type) {
    document.querySelectorAll('.quiz-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(type).classList.add('active');
    event.currentTarget.classList.add('active');
}

function analyzePatterns() {
    let score = 0;
    document.querySelectorAll('input:checked').forEach(i => { if(i.value === 'A') score++; });
    
    let report = "--- BEHAVIORAL ANALYSIS REPORT ---\n";
    if(score > 20) report += "Pattern Observed: High reliance on ego-protection and transactional logic. Consider professional perspective.";
    else if(score > 10) report += "Pattern Observed: Mixed traits of independence and defensive reflexes.";
    else report += "Pattern Observed: Strong indicators of high empathy and communal-based decision making.";
    
    document.getElementById('report').innerText = report;
}

setupQuiz('p-questions', personalityQs);
setupQuiz('c-questions', coupleQs);
</script>
</body>
</html>
